baseURL = 'https://jessebentley.com/'
languageCode = 'en-us'
title = 'Jesse Bentley'
theme = 'PaperMod'
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  author = "Jesse Bentley"
  description = "Security professional, Army veteran, and aspiring penetration tester documenting the transition from enterprise IT to offensive security."
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowFullTextinRSS = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
      Title = "Hi, I'm Jesse Bentley"
      Content = "Security professional and Army veteran with 20 years in enterprise IT, now currently documenting my transition into offensive security and penetration testing. Currently building two long term projects: a comprehensive open source physical security assessment toolkit on the Flipper Zero platform, and GameMaster AI, a from-scratch reinforcement learning system that teaches AI agents to play Steam games using Python and PyTorch."

  [[params.socialIcons]]
      name = "github"
      url = "https://github.com/JDBentley"

  [[params.socialIcons]]
      name = "linkedin"
      url = "https://www.linkedin.com/in/jesse-bentley/"

  [[params.socialIcons]]
      name = "email"
      url = "mailto:jesse@jessebentley.com"

