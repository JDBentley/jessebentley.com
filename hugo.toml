baseURL = 'https://jessebentley.com/'
languageCode = 'en-us'
title = 'Jesse Bentley'
theme = 'PaperMod'
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  author = "Jesse Bentley"
  description = "Security professional, Army veteran, and aspiring penetration tester documenting the transition from enterprise IT to offensive security."
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowFullTextinRSS = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.assets]
      favicon = "/favicon.ico"
      favicon16x16 = "/favicon-16x16.png"
      favicon32x32 = "/favicon-32x32.png"
      apple_touch_icon = "/apple-touch-icon.png"

  [params.homeInfoParams]
      Title = "Hi, I'm Jesse Bentley"
      Content = "Security professional and Army veteran with 20 years in enterprise IT currently documenting my transition into offensive security and penetration testing. Currently building SentinelFlip, a modular physical security reconnaissance platform on the Flipper Zero that sees through walls, detects hidden cameras, and produces actionable intelligence for real world pen testing engagements. Also building GameMaster AI, a from-scratch reinforcement learning system that teaches AI agents to play Steam games using Python and PyTorch."
  [[params.socialIcons]]
      name = "github"
      url = "https://github.com/JDBentley"

  [[params.socialIcons]]
      name = "linkedin"
      url = "https://www.linkedin.com/in/jesse-bentley/"

  [[params.socialIcons]]
      name = "email"
      url = "mailto:jesse@jessebentley.com"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "~/whoami"
    url = "/about/"
    weight = 10

  [[menu.main]]
    identifier = "blog"
    name = "~/writeups"
    url = "/posts/"
    weight = 20

  [[menu.main]]
    identifier = "portfolio"
    name = "~/projects"
    url = "/portfolio/"
    weight = 30

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = true